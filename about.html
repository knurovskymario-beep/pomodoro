<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mario Knurovský</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1a0533 0%, #0d1b4b 40%, #0a2a1a 100%);
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(139, 92, 246, 0.25) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 80%, rgba(99, 102, 241, 0.2) 0%, transparent 55%),
        radial-gradient(ellipse at 60% 10%, rgba(236, 72, 153, 0.15) 0%, transparent 45%);
      pointer-events: none;
    }

    .card {
      max-width: 640px;
      width: 90%;
      padding: 56px 48px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 28px;
      letter-spacing: -0.5px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #f5f5f5;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .tagline {
      font-size: 0.9rem;
      color: #8b5cf6;
      font-weight: 500;
      margin-bottom: 24px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      margin-bottom: 24px;
      border-radius: 2px;
    }

    p {
      font-size: 1.05rem;
      line-height: 1.8;
      color: #aaa;
    }

    .links {
      margin-top: 36px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .link {
      display: inline-block;
      padding: 10px 20px;
      background: #242424;
      color: #e8e8e8;
      border: 1px solid #333;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s, border-color 0.2s;
    }

    .link:hover {
      background: #2e2e2e;
      border-color: #6366f1;
    }

    .link.primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-color: transparent;
      color: #fff;
    }

    .link.primary:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">MK</div>
    <h1>Mario Knurovský</h1>
    <div class="tagline">Developer &amp; Builder</div>
    <div class="divider"></div>
    <p>
      Ahoj! Som Mario — vývojár so záujmom o tvorbu užitočných a krásnych
      digitálnych vecí. Rád riešim problémy, experimentujem s novými
      technológiami a budujem produkty, ktoré ľuďom skutočne pomáhajú.
    </p>
    <div class="links">
      <a href="mailto:knurovskymario@gmail.com" class="link primary">Kontakt</a>
      <a href="https://github.com/knurovskymario-beep" class="link">GitHub</a>
    </div>
  </div>
</body>
</html>
